<!doctype html>

<html lang="en">

<head>

    <!-- ===================================================================
         01. DOCUMENT META
    ==================================================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>RN PDF Reader</title>

    <!-- ===================================================================
         02. STYLESHEETS
    ==================================================================== -->

    <link
        rel="stylesheet"
        href="style2.css"
    >

    <!-- ===================================================================
         03. EXTERNAL LIBRARIES
    ==================================================================== -->

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

</head>

<body>

    <!-- ===================================================================
         04. MOBILE MENU BUTTON
         (VISIBLE ONLY ON MOBILE)
    ==================================================================== -->

    <button id="mobileMenuBtn">

        ☰

    </button>

    <!-- ===================================================================
         05. TOP TOOLBAR
    ==================================================================== -->

    <header id="toolbar">

        <!-- -----------------------------------
             LOGO
        ------------------------------------ -->

        <div class="logo">

            📄 RN PDF

        </div>

        <!-- -----------------------------------
             TOOLBAR ACTIONS
        ------------------------------------ -->

        <div class="toolbar-actions">

            <!-- -----------------------------------
                 PDF FILE INPUT
            ------------------------------------ -->

            <input
                type="file"
                id="pdfFile"
                accept=".pdf"
                hidden
            >

            <!-- -----------------------------------
                 OPEN PDF
            ------------------------------------ -->

            <label
                for="pdfFile"
                id="openPdfBtn"
                title="Open PDF"
            >

                📂 Open

            </label>

            <!-- -----------------------------------
                 ADD TEXT
            ------------------------------------ -->

            <button
                id="addTextBtn"
                disabled
                title="Add Comment"
            >

                ✏ Text

            </button>

            <!-- -----------------------------------
                 TEXT COLOR
            ------------------------------------ -->

            <input
                type="color"
                id="fontColor"
                value="#ff7a00"
                title="Text Color"
            >

            <!-- -----------------------------------
                 LASER TOOLS
            ------------------------------------ -->

            <div class="laser-wrapper">

                <button
                    id="laserBtn"
                    title="Laser Tools"
                >

                    🔴 Laser

                </button>

                <div id="laserMenu">

                    <div
                        class="laser-option"
                        data-mode="dot"
                    >

                        🔴 Laser Dot

                    </div>

                    <div
                        class="laser-option"
                        data-mode="trail"
                    >

                        ✨ Laser Trail

                    </div>

                </div>

            </div>

            <!-- -----------------------------------
                 FONT SIZE
            ------------------------------------ -->

            <input
                type="number"
                id="fontSize"
                value="18"
                min="1"
                max="500"
                title="Font Size"
            >

            <!-- -----------------------------------
                 FULLSCREEN
            ------------------------------------ -->

            <button
                id="fullscreenBtn"
                title="Fullscreen"
            >

                ⛶

            </button>

            <!-- -----------------------------------
                 PAGE NUMBERS
            ------------------------------------ -->

            <button
                id="pageNumberBtn"
                title="Add Page Numbers"
            >

                Page No

            </button>

            <!-- -----------------------------------
                 EXPORT PDF
            ------------------------------------ -->

            <button
                id="downloadBtn"
                title="Save PDF"
            >

                ⬇ Save

            </button>

        </div>

    </header>

    <!-- ===================================================================
         06. WELCOME SCREEN
    ==================================================================== -->

    <section id="welcomeScreen">

        <div class="welcome-card">

            <h1>

                RN PDF Reader

            </h1>

            <label
                for="pdfFile"
                class="hero-open-btn"
            >

                Open PDF

            </label>

        </div>

    </section>

    <!-- ===================================================================
         07. PDF VIEWER
    ==================================================================== -->

    <main id="viewer">

        <div id="pagesContainer">

            <!-- PDF Pages Render Here -->

        </div>

    </main>

    <!-- ===================================================================
         08. APPLICATION SCRIPTS
    ==================================================================== -->

    <script
        type="module"
        src="script2.js"
    ></script>

</body>

</html>
